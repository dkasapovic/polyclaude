name: Sync Upstream

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9am UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # Full history needed for merge

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/Riley-Coyote/polyclaude.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for new upstream commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "Upstream is $BEHIND commit(s) ahead"

      - name: Create sync branch from upstream
        if: steps.check.outputs.behind != '0'
        run: |
          BRANCH="sync/upstream-$(date +%Y-%m-%d)"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          # Branch directly from upstream — no merge, no history conflicts
          git checkout -b "$BRANCH" upstream/main
          git push origin "$BRANCH"

      - name: Open pull request
        if: steps.check.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMITS=$(git log --oneline HEAD..upstream/main | head -20)
          gh pr create \
            --title "chore: sync upstream polyclaude ($(date +%Y-%m-%d))" \
            --body "## Upstream changes

          This PR syncs [${{ steps.check.outputs.behind }} new commit(s)](https://github.com/Riley-Coyote/polyclaude/commits/main) from upstream.

          ### Commits
          \`\`\`
          $COMMITS
          \`\`\`

          > Auto-generated by the [Sync Upstream](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow." \
            --base main \
            --head "$BRANCH" \
            --label "sync" || true  # label is optional, don't fail if missing

      - name: No changes
        if: steps.check.outputs.behind == '0'
        run: echo "Already up to date with upstream. Nothing to do."
